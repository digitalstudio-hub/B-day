<style>
/* ═══════ THEMES ═══════ */
:root{--a:#d4a647;--aR:212,166,71;--a2:#f0d080;--bg:#07070b;--s1:rgba(255,255,255,.04);--s2:rgba(255,255,255,.07);--bd:rgba(255,255,255,.08);--t1:#fff;--t2:rgba(255,255,255,.6);--t3:rgba(255,255,255,.28)}
[data-t="rose"]{--a:#c9707d;--aR:201,112,125;--a2:#f0b0b8}
[data-t="blue"]{--a:#5b9bd5;--aR:91,155,213;--a2:#a0c8f0}
[data-t="purple"]{--a:#9a7fd4;--aR:154,127,212;--a2:#c4b0f0}
[data-t="mint"]{--a:#5db8a3;--aR:93,184,163;--a2:#a0e0d0}

/* ═══════ RESET ═══════ */
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;overflow-x:hidden}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--t1);overflow-x:hidden;-webkit-font-smoothing:antialiased}

/* ═══════ REVEAL ═══════ */
.r{opacity:0;transform:translateY(30px);transition:opacity .7s ease,transform .7s ease}
.r.v{opacity:1;transform:none}

/* ═══════ SPLASH ═══════ */
#splash{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;align-items:center;justify-content:center;transition:opacity .8s,visibility .8s}
#splash.hide{opacity:0;visibility:hidden;pointer-events:none}
.sp{display:flex;flex-direction:column;align-items:center;gap:16px}
.sp-dot{width:6px;height:6px;background:var(--a);border-radius:50%;animation:spB 1.4s ease-in-out infinite}
@keyframes spB{0%,100%{transform:scale(1);opacity:.4}50%{transform:scale(2.5);opacity:1}}
.sp-t{font-size:12px;color:var(--t3);letter-spacing:4px;text-transform:uppercase}

/* ═══════ CANVAS ═══════ */
canvas#glow{position:fixed;inset:0;z-index:-1;pointer-events:none}
canvas#conf{position:fixed;inset:0;z-index:9990;pointer-events:none}

/* ═══════ HERO ═══════ */
#hero{min-height:100vh;min-height:100dvh;display:flex;align-items:center;justify-content:center;text-align:center;padding:40px 24px;position:relative;overflow:hidden}
.h-orb{position:absolute;width:340px;height:340px;border-radius:50%;filter:blur(100px);opacity:.15;background:var(--a)}
.h-orb1{top:5%;left:-80px;animation:od 18s ease-in-out infinite alternate}
.h-orb2{bottom:10%;right:-80px;animation:od 22s 4s ease-in-out infinite alternate}
@keyframes od{0%{transform:translate(0,0)}50%{transform:translate(30px,-20px)}100%{transform:translate(-15px,15px)}}
.h-z{position:relative;z-index:2;max-width:480px}
.h-badge{display:inline-block;padding:6px 20px;border:1px solid var(--bd);border-radius:40px;font-size:12px;color:var(--a);letter-spacing:3px;text-transform:uppercase;margin-bottom:24px;background:var(--s1);backdrop-filter:blur(10px);opacity:0;animation:fi .7s .3s forwards}
.h-age{font-family:'Playfair Display',serif;font-size:clamp(72px,20vw,120px);font-weight:700;line-height:1.2;
padding-right:20px;px;background:linear-gradient(180deg,var(--t1) 40%,var(--a));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:20px;opacity:0;animation:fi .8s .5s forwards}
.h-name{font-family:'Playfair Display',serif;font-style:italic;font-size:clamp(22px,5vw,34px);color:var(--t2);margin-bottom:28px;opacity:0;animation:fi .7s .7s forwards}
.h-msg{font-size:clamp(14px,3.5vw,16px);color:var(--t2);line-height:1.8;font-weight:300;margin-bottom:36px;opacity:0;animation:fi .7s .9s forwards}
.h-scroll{display:flex;flex-direction:column;align-items:center;gap:8px;opacity:0;animation:fi .7s 1.2s forwards}
.h-scroll span{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--t3)}
.h-line{width:1px;height:32px;background:var(--bd);position:relative;overflow:hidden}
.h-line::after{content:'';position:absolute;left:0;width:1px;height:32px;background:var(--a);animation:sl 2s infinite}
@keyframes sl{0%{top:-32px}100%{top:32px}}
@keyframes fi{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}

/* ═══════ COUNTDOWN ═══════ */
#cd{padding:60px 24px;text-align:center}
.cd-wrap{display:inline-flex;gap:24px;flex-wrap:wrap;justify-content:center}
.cd-item{display:flex;flex-direction:column;align-items:center}
.cd-n{font-family:'Playfair Display',serif;font-size:clamp(36px,9vw,56px);font-weight:700;color:var(--a);line-height:1}
.cd-l{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--t3);margin-top:4px}
.cd-dot{width:3px;height:3px;background:var(--t3);border-radius:50%;align-self:center;margin-top:10px}
.cd-today{font-family:'Playfair Display',serif;font-style:italic;font-size:24px;color:var(--a);display:none}

/* ═══════ DIVIDER ═══════ */
.dv{width:1px;height:60px;background:linear-gradient(180deg,transparent,var(--bd),transparent);margin:0 auto}

/* ═══════ NOTE ═══════ */
#note{padding:80px 24px;max-width:560px;margin:0 auto}
.n-label{font-size:10px;letter-spacing:4px;text-transform:uppercase;color:var(--a);margin-bottom:20px}
.n-body{white-space:pre-line;font-size:clamp(15px,3.8vw,17px);color:var(--t2);line-height:2;font-weight:300}
.n-sign{margin-top:28px;font-family:'Playfair Display',serif;font-style:italic;font-size:18px;color:var(--a)}

/* ═══════ WISHES ═══════ */
#wishes{padding:80px 24px;max-width:560px;margin:0 auto;text-align:center}
.w-title{font-family:'Playfair Display',serif;font-style:italic;font-size:clamp(24px,6vw,36px);margin-bottom:32px}
.w-list{display:flex;flex-direction:column;gap:0}
.w-item{padding:18px 0;border-bottom:1px solid var(--bd);font-size:15px;color:var(--t2);font-weight:300;text-align:left;display:flex;align-items:center;gap:14px}
.w-item:last-child{border:none}
.w-num{font-family:'Playfair Display',serif;font-style:italic;font-size:20px;color:var(--a);flex-shrink:0;width:28px}

/* ═══════ PHOTOS ═══════ */
#photos{padding:80px 24px;max-width:560px;margin:0 auto}
.p-title{font-family:'Playfair Display',serif;font-style:italic;font-size:clamp(24px,6vw,36px);text-align:center;margin-bottom:28px}
.p-grid{display:flex;flex-direction:column;gap:16px}
.p-card{position:relative;border-radius:16px;overflow:hidden;cursor:pointer;aspect-ratio:4/5}
.p-card img{width:100%;height:100%;object-fit:cover;transition:transform .6s ease}
.p-card:hover img{transform:scale(1.04)}
.p-card::after{content:'';position:absolute;inset:0;background:linear-gradient(0deg,rgba(0,0,0,.5) 0%,transparent 50%)}
.p-cap{position:absolute;bottom:16px;left:18px;z-index:2;font-size:13px;color:rgba(255,255,255,.85);font-weight:400}
/* Lightbox */
.lb{position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.95);display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;visibility:hidden;transition:.35s;cursor:zoom-out}
.lb.on{opacity:1;visibility:visible}
.lb img{max-width:92%;max-height:82vh;object-fit:contain;border-radius:12px;transform:scale(.93);transition:transform .35s}
.lb.on img{transform:none}
.lb-x{position:absolute;top:16px;right:16px;width:40px;height:40px;border-radius:50%;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);color:#fff;font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer}

/* ═══════ CAKE ═══════ */
#cake{padding:80px 24px;text-align:center}
.c-title{font-family:'Playfair Display',serif;font-style:italic;font-size:clamp(24px,6vw,36px);margin-bottom:6px}
.c-sub{font-size:13px;color:var(--t3);margin-bottom:32px}
.c-box{width:120px;height:160px;margin:0 auto;position:relative;cursor:pointer}
.c-base{position:absolute;left:50%;transform:translateX(-50%);border-radius:8px 8px 12px 12px}
.cb1{bottom:0;width:110px;height:44px;background:linear-gradient(180deg,hsl(30,50%,50%),hsl(30,45%,38%))}
.cb2{bottom:40px;width:86px;height:38px;background:linear-gradient(180deg,var(--a),hsl(35,40%,35%))}
.c-top{position:absolute;left:50%;transform:translateX(-50%);height:8px;border-radius:5px;background:rgba(255,255,255,.75)}
.ct1{bottom:40px;width:116px}.ct2{bottom:74px;width:92px}
.c-cndl{position:absolute;bottom:74px;left:50%;transform:translateX(-50%);display:flex;gap:16px}
.c-stick{width:3px;height:20px;background:#eee;border-radius:2px;position:relative}
.c-fl{position:absolute;top:-10px;left:50%;transform:translateX(-50%);width:7px;height:10px;background:radial-gradient(ellipse,#ffd700 15%,#ff6a00 50%,transparent 72%);border-radius:50%/60% 60% 40% 40%;animation:fk .25s infinite alternate;transition:all .35s}
@keyframes fk{0%{transform:translateX(-50%) scale(1) rotate(-2deg)}100%{transform:translateX(-50%) scale(1.1) rotate(2deg);opacity:.8}}
.c-tap{font-size:11px;color:var(--t3);margin-top:14px;letter-spacing:2px;animation:pls 2s infinite}
@keyframes pls{0%,100%{opacity:.3}50%{opacity:1}}
.c-msg{font-family:'Playfair Display',serif;font-style:italic;font-size:20px;color:var(--a);margin-top:24px;opacity:0;transition:opacity .6s}
.c-msg.on{opacity:1}
.c-confetti{margin-top:24px;padding:12px 28px;border:1px solid var(--bd);border-radius:40px;background:transparent;color:var(--t2);font-size:13px;font-family:'Inter',sans-serif;letter-spacing:1px;transition:all .3s;opacity:0;transition:opacity .6s,transform .3s,background .3s;transform:translateY(10px)}
.c-confetti.on{opacity:1;transform:none}
.c-confetti:hover{background:var(--s2);color:var(--t1)}

/* ═══════ FOOTER ═══════ */
#footer{padding:40px 24px 110px;text-align:center}
.f-line{width:32px;height:1px;background:var(--bd);margin:0 auto 16px}
.f-msg{font-family:'Playfair Display',serif;font-style:italic;font-size:15px;color:var(--t3);margin-bottom:6px}
.f-by{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--t3)}
.f-by b{color:var(--a)}

/* ═══════ (Music FAB removed — using dedicated music section) ═══════ */

/* ═══════ SOCIALS ═══════ */
.soc{position:fixed;bottom:18px;right:18px;z-index:9000;display:flex;flex-direction:column;gap:8px}
.soc a{width:42px;height:42px;border-radius:50%;border:1px solid var(--bd);background:rgba(10,10,16,.9);backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:center;text-decoration:none;transition:.3s}
.soc a:hover{transform:scale(1.1)}
.soc a svg{width:17px;height:17px}
.soc .wa{color:#25D366}.soc .ig{color:#E1306C}

/* ═══════ QUOTE SECTION ═══════ */
#quote{padding:60px 24px;text-align:center}
.q-mark{font-family:'Parisienne',cursive;font-size:80px;color:var(--a);line-height:.5;opacity:.6}
.q-text{font-family:'Playfair Display',serif;font-style:italic;font-size:clamp(20px,5vw,28px);color:var(--t1);max-width:520px;margin:8px auto 16px;line-height:1.5;font-weight:400}
.q-attr{font-size:11px;letter-spacing:4px;text-transform:uppercase;color:var(--t3)}

/* ═══════ MUSIC / AESTHETIC SECTION ═══════ */
#music{padding:80px 24px;text-align:center;position:relative}
.mu-label{font-family:'Parisienne',cursive;font-size:28px;color:var(--a);margin-bottom:8px}
.mu-title{font-family:'Playfair Display',serif;font-style:italic;font-size:clamp(22px,6vw,32px);margin-bottom:40px}
.mu-card{max-width:340px;margin:0 auto;padding:32px 24px;background:var(--s1);border:1px solid var(--bd);border-radius:24px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);position:relative;overflow:hidden}
.mu-card::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 30% 20%,rgba(var(--aR),.1),transparent 60%);pointer-events:none}
.vinyl{width:160px;height:160px;border-radius:50%;margin:0 auto 24px;position:relative;background:radial-gradient(circle,#1a1a1a 0%,#0a0a0a 100%);box-shadow:0 8px 40px rgba(0,0,0,.5),inset 0 0 20px rgba(0,0,0,.8);transition:transform 1s cubic-bezier(.22,1,.36,1)}
.vinyl.spin{animation:vinylSpin 6s linear infinite}
.vinyl::before{content:'';position:absolute;inset:0;border-radius:50%;background:repeating-radial-gradient(circle at center,transparent 0,transparent 3px,rgba(255,255,255,.04) 4px,transparent 5px,transparent 10px)}
.vinyl-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,var(--a),var(--a2));display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .3s;box-shadow:0 0 20px rgba(var(--aR),.3)}
.vinyl-center:hover{transform:translate(-50%,-50%) scale(1.08)}
.vinyl-center::before{content:'';position:absolute;width:8px;height:8px;border-radius:50%;background:var(--bg)}
.vinyl-play{position:absolute;opacity:0;font-size:18px;color:var(--bg)}
.vinyl-center::after{content:'▶';font-size:16px;color:var(--bg);margin-left:3px}
.vinyl-center.playing::after{content:'❚❚';font-size:14px;margin-left:0;letter-spacing:-2px}
@keyframes vinylSpin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.song-name{font-family:'Playfair Display',serif;font-style:italic;font-size:22px;margin-bottom:4px}
.song-art{font-size:12px;color:var(--t3);letter-spacing:2px;text-transform:uppercase;margin-bottom:20px}
.song-bar{height:2px;background:var(--bd);border-radius:2px;overflow:hidden;margin-bottom:20px}
.song-bar-in{height:100%;width:0;background:linear-gradient(90deg,var(--a),var(--a2));border-radius:2px;transition:width .3s linear}
.song-ded{font-family:'Parisienne',cursive;font-size:18px;color:var(--t2);line-height:1.5;margin-top:16px}
.eq{display:flex;gap:3px;justify-content:center;align-items:flex-end;height:20px;margin-top:14px;opacity:0;transition:opacity .4s}
.eq.on{opacity:1}
.eq span{width:2px;background:var(--a);border-radius:2px;height:4px;transition:height .2s}
.eq.on span{animation:eqBar .8s ease-in-out infinite alternate}
.eq.on span:nth-child(2){animation-delay:.15s}
.eq.on span:nth-child(3){animation-delay:.3s}
.eq.on span:nth-child(4){animation-delay:.1s}
.eq.on span:nth-child(5){animation-delay:.25s}
@keyframes eqBar{0%{height:4px}100%{height:18px}}

/* ═══════ FILM GRAIN OVERLAY ═══════ */
.grain{position:fixed;inset:0;z-index:100;pointer-events:none;opacity:.08;mix-blend-mode:overlay}
.grain::before{content:'';position:absolute;inset:0;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='.6'/></svg>");animation:grainMove 8s steps(10) infinite}
@keyframes grainMove{0%,100%{transform:translate(0,0)}10%{transform:translate(-5%,-5%)}30%{transform:translate(3%,-3%)}50%{transform:translate(5%,2%)}70%{transform:translate(-2%,5%)}90%{transform:translate(-3%,-2%)}}

/* ═══════ SPARKLES ═══════ */
#spark{position:fixed;inset:0;z-index:1;pointer-events:none}

/* ═══════ AESTHETIC DIVIDER ═══════ */
.ad{display:flex;align-items:center;justify-content:center;gap:12px;padding:30px 24px;color:var(--t3)}
.ad-line{width:40px;height:1px;background:var(--bd)}
.ad-sym{font-family:'Parisienne',cursive;font-size:20px;color:var(--a);opacity:.7}

@media(max-width:480px){
    .cd-wrap{gap:16px}
    .p-card{aspect-ratio:3/4}
    .vinyl{width:140px;height:140px}
    .vinyl-center{width:52px;height:52px}
}
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash"><div class="sp"><div class="sp-dot"></div><p class="sp-t">loading</p></div></div>

<!-- CANVAS -->
<canvas id="glow"></canvas>
<canvas id="spark"></canvas>
<canvas id="conf"></canvas>
<div class="grain"></div>

<!-- HERO -->
<section id="hero">
    <div class="h-orb h-orb1"></div>
    <div class="h-orb h-orb2"></div>
    <div class="h-z">
        <span class="h-badge" id="hBadge"></span>
        <h1 class="h-age" id="hAge"></h1>
        <p class="h-name" id="hName"></p>
        <p class="h-msg" id="hMsg"></p>
        <div class="h-scroll" onclick="document.getElementById('cd').scrollIntoView({behavior:'smooth'})">
            <span>scroll</span>
            <div class="h-line"></div>
        </div>
    </div>
</section>

<!-- COUNTDOWN -->
<section id="cd">
    <div class="r">
        <div class="cd-wrap" id="cdWrap">
            <div class="cd-item"><span class="cd-n" id="cD">0</span><span class="cd-l">Days</span></div>
            <div class="cd-dot"></div>
            <div class="cd-item"><span class="cd-n" id="cH">0</span><span class="cd-l">Hours</span></div>
            <div class="cd-dot"></div>
            <div class="cd-item"><span class="cd-n" id="cM">0</span><span class="cd-l">Min</span></div>
            <div class="cd-dot"></div>
            <div class="cd-item"><span class="cd-n" id="cS">0</span><span class="cd-l">Sec</span></div>
        </div>
        <p class="cd-today" id="cdToday"></p>
    </div>
</section>

<div class="dv"></div>

<!-- NOTE -->
<section id="note">
    <p class="n-label r">A note for you</p>
    <div class="n-body r" id="nBody"></div>
    <p class="n-sign r" id="nSign"></p>
</section>

<div class="dv"></div>

<!-- WISHES -->
<section id="wishes">
    <h2 class="w-title r">I wish you...</h2>
    <div class="w-list" id="wList"></div>
</section>

<!-- QUOTE -->
<section id="quote">
    <div class="q-mark r">"</div>
    <p class="q-text r" id="qText"></p>
    <p class="q-attr r" id="qAttr"></p>
</section>

<div class="ad"><div class="ad-line"></div><span class="ad-sym">✦</span><div class="ad-line"></div></div>

<!-- PHOTOS -->
<section id="photos">
    <h2 class="p-title r">B'day Boy' ✦</h2>
    <div class="p-grid" id="pGrid"></div>
</section>
<div class="lb" id="lb" onclick="closeLb()">
    <button class="lb-x" onclick="closeLb()">✕</button>
    <img id="lbImg" src="" alt="">
</div>

<!-- MUSIC SECTION -->
<section id="music">
    <p class="mu-label r">dedicated to you</p>
    <h2 class="mu-title r">a song for your birthday</h2>
    <div class="mu-card r">
        <div class="vinyl" id="vinyl">
            <div class="vinyl-center" id="vCenter" onclick="toggleMu()"></div>
        </div>
        <p class="song-name" id="sName"></p>
        <p class="song-art" id="sArt"></p>
        <div class="song-bar"><div class="song-bar-in" id="sBar"></div></div>
        <div class="eq" id="eq">
            <span></span><span></span><span></span><span></span><span></span>
        </div>
        <p class="song-ded" id="sDed"></p>
    </div>
</section>

<div class="ad"><div class="ad-line"></div><span class="ad-sym">♪</span><div class="ad-line"></div></div>

<!-- CAKE -->
<section id="cake">
    <h2 class="c-title r">Make a wish 🕯</h2>
    <p class="c-sub r">tap the cake</p>
    <div class="c-box r" onclick="blow()">
        <div class="c-base cb1"></div><div class="c-top ct1"></div>
        <div class="c-base cb2"></div><div class="c-top ct2"></div>
        <div class="c-cndl">
            <div class="c-stick"><div class="c-fl"></div></div>
            <div class="c-stick"><div class="c-fl"></div></div>
            <div class="c-stick"><div class="c-fl"></div></div>
        </div>
    </div>
    <p class="c-tap" id="cTap">✨</p>
    <p class="c-msg" id="cMsg"></p>
    <button class="c-confetti" id="cBtn" onclick="pop()">🎊 celebrate</button>
</section>

<!-- FOOTER -->
<footer id="footer">
    <div class="f-line"></div>
    <p class="f-msg">made with love.</p>
    <p class="f-by">by <b id="fBy"></b></p>
</footer>

<!-- AUDIO -->
<audio id="aud" loop preload="auto"></audio>

<!-- SOCIALS -->
<div class="soc" id="soc"></div>

<script>
(function(){
const S = MY;

// ── Theme ──
document.documentElement.setAttribute('data-t', S.theme);
document.title = `🎂 Happy Birthday ${S.name}!`;

// ── Splash ──
addEventListener('load', ()=>{ setTimeout(()=>document.getElementById('splash').classList.add('hide'),1800) });

// ── Hero ──
document.getElementById('hBadge').textContent = `Happy Birthday`;
document.getElementById('hAge').textContent = S.age;
document.getElementById('hName').textContent = `Happy Birthday, ${S.name}`;
document.getElementById('hMsg').textContent = S.mainMsg;

// ── Countdown ──
const bd=new Date(S.date+'T00:00:00').getTime();
function tick(){
    const now=Date.now();let d=bd-now;
    if(d>0){
        document.getElementById('cD').textContent=~~(d/864e5);
        document.getElementById('cH').textContent=~~(d%864e5/36e5);
        document.getElementById('cM').textContent=~~(d%36e5/6e4);
        document.getElementById('cS').textContent=~~(d%6e4/1e3);
    } else if(d>-864e5){
        document.getElementById('cdWrap').style.display='none';
        const t=document.getElementById('cdToday');t.style.display='block';
        t.textContent=`🎉 It's today! Happy Birthday!`;
    } else {
        const n=new Date(bd);while(n.getTime()<now)n.setFullYear(n.getFullYear()+1);
        const d2=n.getTime()-now;
        document.getElementById('cD').textContent=~~(d2/864e5);
        document.getElementById('cH').textContent=~~(d2%864e5/36e5);
        document.getElementById('cM').textContent=~~(d2%36e5/6e4);
        document.getElementById('cS').textContent=~~(d2%6e4/1e3);
    }
}
tick();setInterval(tick,1000);

// ── Note ──
document.getElementById('nBody').textContent=S.note;
document.getElementById('nSign').textContent=`— ${S.from}`;

// ── Wishes ──
const wl=document.getElementById('wList');
S.wishes.forEach((w,i)=>{
    const d=document.createElement('div');
    d.className='w-item r';
    d.innerHTML=`<span class="w-num">${String(i+1).padStart(2,'0')}</span>${w}`;
    wl.appendChild(d);
});

// ── Photos ──
const pg=document.getElementById('pGrid');
S.photos.forEach(p=>{
    const d=document.createElement('div');
    d.className='p-card r';
    d.onclick=function(){openLb(this)};
    d.innerHTML=`<img src="${p.src}" alt="${p.caption}" loading="lazy"><span class="p-cap">${p.caption}</span>`;
    pg.appendChild(d);
});

// ── Cake ──
document.getElementById('cMsg').textContent=S.mainMsg.split('.')[0]+'. ✨';

// ── Footer ──
document.getElementById('fBy').textContent=S.from;

// ── Quote ──
document.getElementById('qText').textContent=S.quote;
document.getElementById('qAttr').textContent=S.quoteAttr;

// ── Music Section ──
document.getElementById('sName').textContent=S.songTitle;
document.getElementById('sArt').textContent=S.songArtist;
document.getElementById('sDed').textContent=`"${S.songMessage}"`;
if(S.music){
    document.getElementById('aud').innerHTML=`<source src="${S.music}" type="audio/mpeg">`;
}
// Update progress bar while playing
const aud=document.getElementById('aud');
aud.addEventListener('timeupdate',()=>{
    if(aud.duration){
        const pct=(aud.currentTime/aud.duration)*100;
        document.getElementById('sBar').style.width=pct+'%';
    }
});

// ── Socials ──
const sc=document.getElementById('soc');
if(S.whatsapp) sc.innerHTML+=`<a href="https://wa.me/${S.whatsapp}" target="_blank" class="wa"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg></a>`;
if(S.instagram) sc.innerHTML+=`<a href="https://instagram.com/${S.instagram}" target="_blank" class="ig"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg></a>`;

// ── Scroll Reveal ──
const obs=new IntersectionObserver(es=>{
    es.forEach(e=>{if(e.isIntersecting)e.target.classList.add('v')});
},{threshold:.1});
document.querySelectorAll('.r').forEach(el=>obs.observe(el));

// ── Ambient Glow Canvas ──
const gc=document.getElementById('glow'),gx=gc.getContext('2d');
function rgc(){gc.width=innerWidth;gc.height=innerHeight}
rgc();addEventListener('resize',rgc);
const cs=getComputedStyle(document.documentElement);
const orbs=[
    {x:.3,y:.2,r:200,s:.0003,p:0},
    {x:.7,y:.7,r:160,s:.0004,p:2},
    {x:.5,y:.5,r:120,s:.0005,p:4}
];
(function drawGlow(){
    gx.clearRect(0,0,gc.width,gc.height);
    orbs.forEach(o=>{
        o.p+=o.s;
        const x=gc.width*(o.x+Math.sin(o.p)*.05);
        const y=gc.height*(o.y+Math.cos(o.p*.7)*.04);
        const g=gx.createRadialGradient(x,y,0,x,y,o.r);
        g.addColorStop(0,`rgba(var(--aR),.04)`.replace('var(--aR)',cs.getPropertyValue('--aR').trim()));
        g.addColorStop(1,'transparent');
        gx.fillStyle=g;
        gx.fillRect(x-o.r,y-o.r,o.r*2,o.r*2);
    });
    requestAnimationFrame(drawGlow);
})();

// ── Sparkle Canvas ──
const sk=document.getElementById('spark'),skx=sk.getContext('2d');
function rsk(){sk.width=innerWidth;sk.height=innerHeight}
rsk();addEventListener('resize',rsk);
const sparkles=[];
const skCnt=innerWidth<600?25:45;
for(let i=0;i<skCnt;i++){
    sparkles.push({
        x:Math.random()*sk.width,
        y:Math.random()*sk.height,
        s:Math.random()*.8+.3,
        p:Math.random()*6.28,
        sp:Math.random()*.02+.008,
        dy:-.1-Math.random()*.15
    });
}
(function drawSpark(){
    skx.clearRect(0,0,sk.width,sk.height);
    sparkles.forEach(sp=>{
        sp.y+=sp.dy;sp.p+=sp.sp;
        if(sp.y<-5){sp.y=sk.height+5;sp.x=Math.random()*sk.width}
        const a=Math.sin(sp.p)*.4+.4;
        if(a<.1)return;
        skx.save();
        skx.translate(sp.x,sp.y);
        skx.rotate(sp.p*.3);
        skx.globalAlpha=a;
        skx.fillStyle='#fff';
        // 4-point star
        skx.beginPath();
        const s=sp.s;
        skx.moveTo(0,-s*3);skx.lineTo(s*.5,-s*.5);
        skx.lineTo(s*3,0);skx.lineTo(s*.5,s*.5);
        skx.lineTo(0,s*3);skx.lineTo(-s*.5,s*.5);
        skx.lineTo(-s*3,0);skx.lineTo(-s*.5,-s*.5);
        skx.closePath();skx.fill();
        // glow
        skx.globalAlpha=a*.3;
        skx.beginPath();skx.arc(0,0,s*4,0,6.28);
        skx.fillStyle='rgba(255,255,255,.4)';skx.fill();
        skx.restore();
    });
    requestAnimationFrame(drawSpark);
})();    
})();

// ── Lightbox ──
function openLb(el){document.getElementById('lbImg').src=el.querySelector('img').src;document.getElementById('lb').classList.add('on');document.body.style.overflow='hidden'}
function closeLb(){document.getElementById('lb').classList.remove('on');document.body.style.overflow=''}

// ── Cake Blow ──
let blown=false;
function blow(){
    if(blown)return;blown=true;
    document.querySelectorAll('.c-fl').forEach((f,i)=>{
        setTimeout(()=>{f.style.opacity='0';f.style.transform='translateX(-50%) scale(0)'},i*150);
    });
    document.getElementById('cTap').style.display='none';
    setTimeout(()=>{
        document.getElementById('cMsg').classList.add('on');
        document.getElementById('cBtn').classList.add('on');
        pop();
    },3*150+300);
}

// ── Music Control (via vinyl) ──
let mOn=false;
function toggleMu(){
    const a=document.getElementById('aud');
    const vinyl=document.getElementById('vinyl');
    const center=document.getElementById('vCenter');
    const eq=document.getElementById('eq');
    if(mOn){
        a.pause();
        vinyl.classList.remove('spin');
        center.classList.remove('playing');
        eq.classList.remove('on');
        mOn=false;
    } else {
        a.play().catch(()=>{});
        vinyl.classList.add('spin');
        center.classList.add('playing');
        eq.classList.add('on');
        mOn=true;
    }
}

// ── Confetti ──
function pop(){
    const cv=document.getElementById('conf'),cx=cv.getContext('2d');
    cv.width=innerWidth;cv.height=innerHeight;
    const pcs=[],cols=['#d4a647','#ff6b6b','#feca57','#a29bfe','#fff','#f0d080','#5db8a3','#c9707d'];
    for(let i=0;i<200;i++){
        const a=Math.random()*Math.PI*2,sp=6+Math.random()*14;
        pcs.push({x:cv.width/2,y:cv.height/2,w:Math.random()*8+3,h:Math.random()*4+2,c:cols[~~(Math.random()*cols.length)],vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-3,g:.3,rot:Math.random()*360,rs:(Math.random()-.5)*12,op:1,dec:Math.random()*.005+.002});
    }
    let id;
    (function draw(){
        cx.clearRect(0,0,cv.width,cv.height);let alive=false;
        pcs.forEach(c=>{
            if(c.op<=0)return;alive=true;
            c.x+=c.vx;c.vy+=c.g;c.y+=c.vy;c.vx*=.985;c.rot+=c.rs;c.op-=c.dec;
            cx.save();cx.translate(c.x,c.y);cx.rotate(c.rot*Math.PI/180);
            cx.globalAlpha=Math.max(0,c.op);cx.fillStyle=c.c;
            cx.fillRect(-c.w/2,-c.h/2,c.w,c.h);cx.restore();
        });
        if(alive)id=requestAnimationFrame(draw);
        else{cancelAnimationFrame(id);cx.clearRect(0,0,cv.width,cv.height)}
    })();
}
</script>
</body>
</html>
